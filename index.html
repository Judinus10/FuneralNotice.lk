        function loadComponent(url, elementId) {
            fetch(url)
                .then(response => response.text())
                .then(data => {
                    document.getElementById(elementId).innerHTML = data;

                    // Re-initialize event listeners after navbar loads
                    if (elementId === 'navbar-placeholder') {
                        if (typeof initMobileMenu === 'function') initMobileMenu();
                        if (typeof initMobileSearch === 'function') initMobileSearch();
                        if (typeof initMobileApp === 'function') initMobileApp();
                    }
                })
                .catch(error => console.error('Error loading component:', error));
        }

        // Load components when DOM is ready
        loadComponent('navbar.html', 'navbar-placeholder');
        loadComponent('footer.html', 'footer-placeholder');

        function initMobileCarousel() {
            let mobileAdIndex = 0;
            const mobileSlides = document.querySelectorAll('#mobileSponsoredCarousel .ad-slide');
            const mobileDots = document.querySelectorAll('#mobileAdDots .ad-dot');

            function showMobileAd(index) {
                if (index >= mobileSlides.length || index < 0) return;

                mobileSlides.forEach(slide => slide.classList.remove('active'));
                mobileDots.forEach(dot => dot.classList.remove('active'));

                mobileSlides[index].classList.add('active');
                mobileDots[index].classList.add('active');

                mobileAdIndex = index;
            }

            // Add click handlers to dots
            mobileDots.forEach((dot, index) => {
                dot.addEventListener('click', () => showMobileAd(index));
            });

            // Auto rotate for mobile
            let mobileAdInterval = setInterval(() => {
                const nextIndex = (mobileAdIndex + 1) % sponsoredAds.length;
                showMobileAd(nextIndex);
            }, 5000);

            // Pause on hover
            const mobileCarousel = document.getElementById('mobileSponsoredCarousel');
            if (mobileCarousel) {
                mobileCarousel.addEventListener('mouseenter', () => {
                    clearInterval(mobileAdInterval);
                });

                mobileCarousel.addEventListener('mouseleave', () => {
                    mobileAdInterval = setInterval(() => {
                        const nextIndex = (mobileAdIndex + 1) % sponsoredAds.length;
                        showMobileAd(nextIndex);
                    }, 5000);
                });
            }
        }

        function showAd(index) {
            const slides = document.querySelectorAll('.ad-slide');
            const dots = document.querySelectorAll('.ad-dot');

            if (index >= slides.length || index < 0) return;

            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));

            slides[index].classList.add('active');
            dots[index].classList.add('active');

            currentAdIndex = index;
            resetAdRotation();
        }

        function nextAd() {
            const nextIndex = (currentAdIndex + 1) % sponsoredAds.length;
            showAd(nextIndex);
        }

        function prevAd() {
            const prevIndex = (currentAdIndex - 1 + sponsoredAds.length) % sponsoredAds.length;
            showAd(prevIndex);
        }

        function startAdRotation() {
            adInterval = setInterval(nextAd, 5000);
        }

        function resetAdRotation() {
            clearInterval(adInterval);
            startAdRotation();
        }

        function addTouchSupport(carousel) {
            let touchStartX = 0;
            let touchEndX = 0;

            carousel.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            carousel.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, { passive: true });

            function handleSwipe() {
                const swipeThreshold = 50;
                const diff = touchStartX - touchEndX;

                if (Math.abs(diff) > swipeThreshold) {
                    if (diff > 0) {
                        nextAd();
                    } else {
                        prevAd();
                    }
                }
            }
        }

        function getTotalReactions(reactions) {
            return Object.values(reactions).reduce((sum, count) => sum + count, 0);

                .slice(0, 3)
                .filter(([, count]) => count > 0);

            return sorted.map(([emotion]) => reactionTypes[emotion].emoji);

        function showFacebookReactionPopup(memorialId, event) {
            event.preventDefault();
            event.stopPropagation();

            document.querySelectorAll('.fb-reaction-popup').forEach(popup => {
                popup.classList.remove('show');
            });

            const popup = document.getElementById(`fbReactionPopup-${memorialId}`);
            if (popup) {
                popup.classList.toggle('show');

                const closePopupHandler = (e) => {
                    if (!popup.contains(e.target) && !e.target.closest('.fb-reaction-btn')) {
                        popup.classList.remove('show');
                        document.removeEventListener('click', closePopupHandler);
                    }
                };

                setTimeout(() => {
                    document.addEventListener('click', closePopupHandler);
                }, 10);
            }
        }

        function handleReaction(memorialId, reactionType, event) {
            event.preventDefault();
            event.stopPropagation();

            const memorial = memorials.find(m => m.id === memorialId);
            if (!memorial) return;

            if (memorial.userReaction) {
                memorial.reactions[memorial.userReaction]--;
            }

            memorial.userReaction = reactionType;
            memorial.reactions[reactionType]++;

            const popup = document.getElementById(`fbReactionPopup-${memorialId}`);
            if (popup) {
                popup.classList.remove('show');
            }

            updateFacebookReactionUI(memorialId);
        }

            if (!memorial) return;

            const totalReactions = getTotalReactions(memorial.reactions);
            const topReactions = getTopReactions(memorial.reactions);
            const reactionBtn = document.querySelector(`[data-id="${memorialId}"] .fb-reaction-btn`);
            const reactionStats = document.querySelector(`[data-id="${memorialId}"] .reaction-summary`);

            if (reactionBtn) {
                if (memorial.userReaction) {
                    reactionBtn.classList.add('active');
                    reactionBtn.innerHTML = `

                            ${Object.entries(reactionTypes).map(([key, value]) => `

                                     data-label="${value.label}"

                                    ${value.emoji}

                                <div class="fb-reaction-option"

        function handleCardClick(memorialId, event) {
            event.preventDefault();

            const memorial = memorials.find(m => m.id === memorialId);

            if (memorial) {
                const enhancedMemorial = {
                    ...memorial,
                    birthDate: formatDateString(memorial.birthYear),
                    deathDate: formatDateString(memorial.deathYear),
                    age: calculateAge(memorial.birthYear, memorial.deathYear),
                    birthPlace: memorial.locations && memorial.locations.length > 0 ? memorial.locations[0] : "Not specified",
                    livedPlaces: memorial.locations ? memorial.locations.join(", ") : "Not specified",
                    religion: "Hinduism",
                    funeralDate: getFuneralDate(memorial.deathYear),
                    lifeStory: generateLifeStory(memorial)
                };

                localStorage.setItem('currentMemorial', JSON.stringify(enhancedMemorial));
                window.location.href = `memorial-detail.html?id=${memorialId}`;
            }

            return false;
        }

        function formatDateString(year) {
            const month = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"][Math.floor(Math.random() * 12)];
            const day = Math.floor(Math.random() * 28) + 1;
            return `${day}<br>${month}<br>${year}`;
        }

        function calculateAge(birthYear, deathYear) {
            const age = parseInt(deathYear) - parseInt(birthYear);
            return `Age ${age}`;
        }

        function getFuneralDate(deathYear) {
            const month = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"][Math.floor(Math.random() * 12)];
            const day = Math.floor(Math.random() * 28) + 1;
            return `${day} ${month} ${parseInt(deathYear) + 1}, 10:00 AM`;
        }

        function generateLifeStory(memorial) {
            return `
                <p><strong>In loving memory of ${memorial.name}.</strong></p>
                <p>Born in ${memorial.birthYear} and passed away in ${memorial.deathYear}.</p>
                ${memorial.locations ? `<p>Lived in: ${memorial.locations.join(", ")}</p>` : ''}
                <p>A beloved family member and friend who will be dearly missed by all who knew them.</p>
                <p>Their memory will live on in the hearts of family and friends.</p>
                <p><strong>Funeral arrangements:</strong> Will be announced by the family.</p>
                <p>Our deepest condolences to the grieving family.</p>
            `;
        }

                    button.style.display = 'none';
                    document.querySelector('.load-more-container p').textContent = `Showing all ${memorials.length} memorials`;

        function filterMemorials(type) {
            const filtered = type === 'all' ? memorials : memorials.filter(m => m.type === type);
            displayedMemorials = Math.min(6, filtered.length);

            const mobileMenuContainer = document.getElementById('mobileMenuContainer');
            const mobileMenuOverlay = document.getElementById('mobileMenuOverlay');

            mobileMenuOverlay.style.opacity = '0';

            setTimeout(() => {
                mobileMenuContainer.style.display = 'none';
                mobileMenuOverlay.style.display = 'none';
                document.body.style.overflow = '';
                document.body.style.paddingRight = '';
            }, 300);
        }

        function preventBodyScroll() {
            const scrollBarWidth = window.innerWidth - document.documentElement.clientWidth;
            document.body.style.overflow = 'hidden';
            document.body.style.paddingRight = scrollBarWidth + 'px';
        }

        function initMobileMenu() {
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const mobileMenuClose = document.getElementById('mobileMenuClose');
            const mobileMenuContainer = document.getElementById('mobileMenuContainer');
            const mobileMenuOverlay = document.getElementById('mobileMenuOverlay');

            if (!mobileMenuBtn || !mobileMenuContainer) return;

            mobileMenuBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                mobileMenuContainer.style.display = 'block';
                mobileMenuOverlay.style.display = 'block';
                preventBodyScroll();

                mobileMenuContainer.offsetHeight;

                setTimeout(() => {
                    mobileMenuOverlay.style.opacity = '1';
                    mobileMenuContainer.classList.add('active');
                }, 10);
            });

            mobileMenuClose.addEventListener('click', closeMobileMenu);
            mobileMenuOverlay.addEventListener('click', closeMobileMenu);

            document.querySelectorAll('.mobile-menu-nav a').forEach(link => {
                link.addEventListener('click', function (e) {
                    const href = this.getAttribute('href');
                    if (href && href !== '#') {
                        closeMobileMenu();
                        if (href.includes('obituaries')) {
                            filterMemorials('obituary');
                        } else if (href.includes('remembrance')) {
                            filterMemorials('remembrance');
                        }
                    }
                });
            });

            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && mobileMenuContainer.classList.contains('active')) {
                    closeMobileMenu();
                }
            });
        }

        function initSidebarToggle() {

            const leftSidebar = document.getElementById('leftSidebar');
            const rightSidebar = document.getElementById('rightSidebar');

            if (!toggleLeftBtn || !toggleRightBtn) return;

            // Only show left sidebar toggle on mobile
            if (window.innerWidth <= 992) {
                toggleRightBtn.style.display = 'none';
            }

            toggleLeftBtn.addEventListener('click', function () {
                leftSidebar.classList.toggle('active');
                rightSidebar.classList.remove('active');
                toggleLeftBtn.classList.toggle('active');
                toggleRightBtn.classList.remove('active');
            });

            toggleRightBtn.addEventListener('click', function () {
                rightSidebar.classList.toggle('active');
                leftSidebar.classList.remove('active');
                toggleRightBtn.classList.toggle('active');
                toggleLeftBtn.classList.remove('active');
            });

            document.addEventListener('click', function (e) {
                const isMobile = window.innerWidth <= 992;

                if (isMobile && leftSidebar.classList.contains('active')) {
                    if (!leftSidebar.contains(e.target) && !toggleLeftBtn.contains(e.target)) {
                        leftSidebar.classList.remove('active');
                        toggleLeftBtn.classList.remove('active');
                    }
                }

                if (isMobile && rightSidebar.classList.contains('active')) {
                    if (!rightSidebar.contains(e.target) && !toggleRightBtn.contains(e.target)) {
                        rightSidebar.classList.remove('active');
                        toggleRightBtn.classList.remove('active');
                    }
                }
            });

                    }
