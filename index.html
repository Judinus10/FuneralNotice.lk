<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuneralNotice.lk - Keeping Memories Alive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style/common.css">
    <link rel="stylesheet" href="style/navbar.css">
    <link rel="stylesheet" href="style/footer.css">
    <link rel="stylesheet" href="style/index.css">

</head>

<body>
    <!-- Navbar Component -->
    <div id="navbar-placeholder"></div>

    <div class="main-body">
        <div class="container">
            <!-- Mobile Sponsored Ads Section (Shows only on mobile) -->
            <div class="mobile-sponsored-section" id="mobileSponsoredSection">
                <!-- Mobile sponsored ads will be inserted here by JavaScript -->
            </div>

            <div class="sidebar-toggle-container">

            </div>

            <div class="feeds">
                <div class="sidebar sidebar-left" id="leftSidebar">
                    <div class="list-multiple-item">
                        <div class="header">
                            <h2><i class="fas fa-clock"></i> Recent Posts</h2>
                        </div>
                        <div class="list">
                            <ul id="recentPosts">
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="main-content">
                    <div class="section-tabs">
                        <div class="tabs-header">
                            <div class="contact-display">
                                <i class="fas fa-phone"></i>
                                <span class="phone-number">+94 11 234 5678</span>
                                <span class="badge">24/7</span>
                            </div>
                            <a href="#" class="whatsapp-btn hide-on-mobile">
                                <i class="fab fa-whatsapp"></i> Chat with us
                            </a>
                        </div>

                        <div class="tabs-nav">
                            <a href="index.html" class="active"><i class="fas fa-home"></i> Home</a>
                            <a href="index.html.Obituaries"><i class="fas fa-book"></i> Obituaries</a>
                            <a href="index.html.Remembrance"><i class="fas fa-calendar-heart"></i> Remembrance</a>
                            <!-- REMOVED the Recent button from tabs -->
                        </div>

                        <div class="feeds-container" id="feedsContainer">
                        </div>

                        <div class="load-more-container">
                            <button class="load-more-btn" id="loadMoreBtn">
                                <i class="fas fa-spinner"></i> Load More Memorials
                            </button>
                            <p style="margin-top: 8px; color: var(--light-text); font-size: 0.75rem;">
                                Showing <span id="currentCount">6</span> memorials
                            </p>
                        </div>
                    </div>
                </div>

                <div class="sidebar sidebar-right" id="rightSidebar">
                    <!-- Recent Tributes section (hidden on mobile) -->
                    <div class="list-multiple-item square hide-on-mobile">
                        <div class="header cover-tribute">
                            <h2><i class="fas fa-heart"></i> Recent Tributes</h2>
                        </div>
                        <div class="list recent-tributes-container">
                            <ul id="recentTributes">
                            </ul>
                        </div>
                    </div>

                    <!-- Desktop sponsored ads (hidden on mobile) -->
                    <div class="list-multiple-item sticky-sponsor hide-on-mobile">
                        <div class="header"
                            style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);">
                            <h2><i class="fas fa-ad"></i> Sponsored Ads</h2>
                            <a href="https://api.whatsapp.com/send?phone=94769988123&text=Hello%20WEBbuilders.lk%20%F0%9F%91%8B%2C"
                                target="_blank" rel="noopener" class="whatsapp-btn-small"
                                style="background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); color: white; padding: 6px 12px; border-radius: 6px; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; font-size: 0.8rem; font-weight: 600; transition: var(--transition); white-space: nowrap;">
                                <i class="fab fa-whatsapp"></i>
                                Place Ad
                            </a>
                        </div>
                        <div class="list">
                            <div id="sponsoredCarousel" class="sponsored-carousel">
                            </div>
                            <div class="ad-dots" id="adDots"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Component -->
    <div id="footer-placeholder"></div>

    <script src="script/common.js"></script>
    <script>
        // Load components when DOM is ready
        loadComponent('navbar.html', 'navbar-placeholder');
        loadComponent('footer.html', 'footer-placeholder');
    </script>
    <script src="script/index.js"></script>
</body>

</html>
